// ── SUPABASE AUTH ──────────────────────────────────────────────────────────────
async function sbLogin(email, password){
  var result = await _db.auth.signInWithPassword({ email: email, password: password });
  return result;
}

async function sbGetSession(){
  var r = await _db.auth.getSession();
  return r.data ? r.data.session : null;
}

async function sbSignOut(){
  if(_db) await _db.auth.signOut();
}

// ── SUPABASE DATA FUNCTIONS ────────────────────────────────────────────────────
async function sbGetAll(tableName){
  var r = await _db.from(tableName).select("*").order("id");
  if(r.error) throw new Error(r.error.message);
  return r.data || [];
}

async function sbInsert(tableName, fields){
  var r = await _db.from(tableName).insert(fields).select().single();
  if(r.error) throw new Error(r.error.message);
  return r.data;
}

async function sbUpdate(tableName, id, fields){
  var r = await _db.from(tableName).update(fields).eq("id", id).select().single();
  if(r.error) throw new Error(r.error.message);
  return r.data;
}

function f2card(row){

    status: row.status||"available",
    empId:  row.emp_id||null,
    holder: row.holder||null,

  return{
    card_id:       c.id,
    time_code:     c.tc||"",

function fmtD(iso){if(!iso)return"—";var d=new Date(iso+"T00:00:00");return String(d.getDate()).padStart(2,"0")+"-"+MONTHS[d.getMonth()]+"-"+d.getFullYear();}
function today(){return new Date().toISOString().split("T")[0];}
function daysB(d1,d2){var base=d2?new Date(d2+"T00:00:00"):new Date();return Math.floor((base-new Date(d1+"T00:00:00"))/86400000);}
function nowTs(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"-"+MONTHS[d.getMonth()]+"-"+d.getFullYear()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0");}
function genTC(id){var h=0;for(var i=0;i<id.length;i++){h=((h<<5)-h+id.charCodeAt(i))|0;}return String(Math.abs(h)%10000000000).padStart(10,"0");}

function parseXlDate(v){if(!v)return null;if(typeof v==="number"){var d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().split("T")[0];}var s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;var d2=new Date(s);return isNaN(d2)?null:d2.toISOString().split("T")[0];}

// ── DATA HOOK ──────────────────────────────────────────────────────────────────
function useData(){

  var _d=useState([]),alog=_d[0],setLogRaw=_d[1];
  var _e2=useState(DEPTS),depts=_e2[0],setDepts=_e2[1];
  var _f=useState(""),cusr=_f[0],setCusr=_f[1];
  var _g=useState(false),syncing=_g[0],setSyncing=_g[1];

  var _i=useState(null),lastSync=_i[0],setLastSync=_i[1];
  var poll=useRef(null);

  async function fetchAll(){
    setSyncing(true);setSyncErr(null);
    try{
      var res=await Promise.all([
        sbGetAll("access_cards"),
        sbGetAll("access_card_history"),
        sbGetAll("access_card_log")
      ]);
      setCardsRaw(res[0].map(f2card));
      setHistRaw(res[1].map(f2hist));
      setLogRaw(res[2].map(f2log).sort(function(a,b){return(b.spId||0)-(a.spId||0);}));
      var d=new Date();setLastSync(String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"));
    }catch(err){setSyncErr(String(err.message).slice(0,80));}
    setSyncing(false);
  }

  async function connect(userDisplayName){
    setSyncing(true);setSyncErr(null);
    try{
      if(userDisplayName)setCusr(userDisplayName);
      await fetchAll();
      setMode("supabase");
      poll.current=setInterval(fetchAll,15000);
    }catch(err){
      setSyncErr(String(err.message).slice(0,80));
    }
    setSyncing(false);
  }
  function disconnect(){setMode("local");clearInterval(poll.current);setCardsRaw(INIT_CARDS);setHistRaw(INIT_HIST);setLogRaw([]);setCusr("");sbSignOut();}
  useEffect(function(){return function(){clearInterval(poll.current);};},[]);

  function addLog(action,cardId,detail){
    var entry={id:Date.now(),ts:nowTs(),user:cusr||"User",action:action,cardId:cardId,detail:detail,spId:null};
    setLogRaw(function(p){return[entry,...p];});
    if(mode==="supabase"){
      sbInsert("access_card_log",log2f(entry)).then(function(res){
        if(res&&res.id){
          setLogRaw(function(p){return p.map(function(l){return l.id===entry.id?Object.assign({},l,{spId:res.id}):l;});});
        }
      }).catch(function(){});
    }
  }

  function setCards(upd){
    setCardsRaw(function(prev){
      var next=typeof upd==="function"?upd(prev):upd;
      if(mode==="supabase")syncCards(prev,next);
      return next;
    });
  }
  function setHist(upd){
    setHistRaw(function(prev){
      var next=typeof upd==="function"?upd(prev):upd;
      if(mode==="supabase")syncHist(prev,next);
      return next;
    });
  }

  async function syncCards(old,nw){
    var om={};old.forEach(function(c){om[c.id]=c;});
    for(var i=0;i<nw.length;i++){
      var c=nw[i];
      try{
        if(c.spId&&om[c.id]&&JSON.stringify(om[c.id])!==JSON.stringify(c)){
          await sbUpdate("access_cards",c.spId,card2f(c));
        } else if(!c.spId&&!om[c.id]){
          var res=await sbInsert("access_cards",card2f(c));
          if(res&&res.id){
            (function(cid,sid){setCardsRaw(function(cs){return cs.map(function(x){return x.id===cid?Object.assign({},x,{spId:sid}):x;});});})(c.id,res.id);
          }
        }
      }catch(err){console.error("syncCards",err);}
    }
  }
  async function syncHist(old,nw){
    var oids={};old.forEach(function(h){oids[h.id]=h;});
    for(var i=0;i<nw.length;i++){
      var h=nw[i];
      try{
        if(oids[h.id]){
          // Existing record — sync if changed (e.g. undone flag)
          if(h.spId&&JSON.stringify(oids[h.id])!==JSON.stringify(h)){
            await sbUpdate("access_card_history",h.spId,hist2f(h));
          }
        } else if(!h.spId){
          // New record
          var res=await sbInsert("access_card_history",hist2f(h));
          if(res&&res.id){
            (function(hid,sid){setHistRaw(function(hs){return hs.map(function(x){return x.id===hid?Object.assign({},x,{spId:sid}):x;});});})(h.id,res.id);
          }
        }
      }catch(err){console.error("syncHist",err);}
    }
  }

  return{mode,cards,setCards,hist,setHist,alog,depts,setDepts,cusr,setCusr,syncing,syncErr,lastSync,connect,disconnect,refresh:fetchAll,addLog};
}
